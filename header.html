<header class="sticky top-0 z-30 backdrop-blur-md bg-bg/80 border-b border-white/5">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 h-16 flex items-center gap-4">
    <a href="/" class="flex items-center shrink-0" aria-label="ANIMEFLOW — на главную">
      <img src="/static/images/logo.png" alt="ANIMEFLOW" class="logo" />
    </a>

    <nav class="hidden md:flex items-center gap-1 ml-4 text-sm">
      <a href="/" class="px-3 py-2 rounded-lg hover:bg-white/5 {% if active=='home' %}text-accent{% endif %}">Главная</a>
      <a href="/catalog" class="px-3 py-2 rounded-lg hover:bg-white/5 {% if active=='catalog' %}text-accent{% endif %}">Каталог</a>
      <a href="/random" class="px-3 py-2 rounded-lg hover:bg-white/5">Случайное</a>
    </nav>

    <div class="relative flex-1 max-w-lg ml-auto md:ml-4" id="search-wrap">
      <form action="/search" method="get" class="w-full">
        <input
          id="search-input"
          name="q"
          type="text"
          autocomplete="off"
          placeholder="Поиск аниме…"
          class="w-full bg-surface border border-white/5 focus:border-accent focus:ring-2 focus:ring-accent/30 outline-none rounded-xl pl-10 pr-3 py-2.5 text-sm placeholder-gray-500 transition"
        />
        <svg class="w-5 h-5 absolute left-3 top-1/2 -translate-y-1/2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-4.35-4.35M17 11a6 6 0 11-12 0 6 6 0 0112 0z"/></svg>
      </form>
      <div id="search-results" class="hidden absolute top-full mt-2 left-0 right-0 bg-surface border border-white/5 rounded-2xl shadow-2xl overflow-hidden z-40"></div>
    </div>

    <div class="hidden md:flex items-center gap-2 ml-2">
      {% if user %}
        <a href="/achievements" class="px-3 py-2 rounded-xl hover:bg-white/5 transition text-sm text-gray-400 hover:text-white" title="Достижения">🏆</a>
        <a href="/profile" class="flex items-center gap-2 px-3 py-2 rounded-xl hover:bg-white/5 transition">
          {% if user.avatar_url %}
            <img src="{{ user.avatar_url }}" alt="{{ user.username }}"
                 class="w-8 h-8 rounded-full object-cover border border-accent/30"
                 onerror="this.onerror=null;this.style.display='none';this.nextElementSibling.style.display='grid'" />
            <span class="w-8 h-8 rounded-full bg-accent/20 grid place-items-center text-accent font-bold uppercase text-sm" style="display:none">
              {{ (user.username or '?')[0]|upper }}
            </span>
          {% else %}
            <span class="w-8 h-8 rounded-full bg-accent/20 grid place-items-center text-accent font-bold uppercase text-sm">
              {{ (user.username or '?')[0]|upper }}
            </span>
          {% endif %}
          <span class="text-sm">{{ user.username }}</span>
        </a>
        <a href="/logout" class="text-xs text-gray-400 hover:text-white px-2">Выйти</a>
      {% else %}
        <a href="/login" class="px-3 py-2 text-sm rounded-xl hover:bg-white/5">Войти</a>
        <a href="/register" class="px-3 py-2 text-sm rounded-xl bg-accent hover:bg-accentSoft transition shadow-glow">Регистрация</a>
      {% endif %}
    </div>

    <button onclick="openMobile()" class="md:hidden ml-2 w-10 h-10 grid place-items-center rounded-xl hover:bg-white/5">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>
</header>
