services:
  - type: web
    name: animeflow
    runtime: python
    rootDir: .
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    envVars:
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: animeflow-data
      mountPath: /app/data
      sizeGB: 1
